<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 900 440" width="900" height="440">
  <title id="title">Cadeia empresarial ilustrativa de validação da TrustGate Sovereign</title>
  <desc id="desc">Entradas e contexto empresariais passam pela autorização da ação da TrustGate Sovereign e por um recibo vinculado, pela validação no sistema-alvo protegido, por um resultado ilustrativo aceite ou rejeitado no lado do Db2 e por evidência do resultado passível de análise.</desc>
  <rect id="panel-rect" data-node-id="panel" x="1" y="1" width="898" height="438" rx="18" fill="#11191f" stroke="#34444f"/>
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <text x="26" y="34" fill="#d3a44d" font-size="13" font-weight="800">ENTRADAS / CONTEXTO</text>
    <g fill="#1e2930" stroke="#5cc8bb"><rect id="orchestration-input-rect" data-node-id="orchestration-input" x="24" y="54" width="170" height="82" rx="14"/><rect id="lineage-context-rect" data-node-id="lineage-context" x="24" y="164" width="170" height="82" rx="14"/><rect id="identity-authority-context-rect" data-node-id="identity-authority-context" x="24" y="274" width="170" height="82" rx="14"/></g>
    <g fill="#102823" stroke="#d3a44d" stroke-width="2"><rect id="trustgate-clearance-rect" data-node-id="trustgate-clearance" x="235" y="130" width="170" height="150" rx="16"/><rect id="protected-target-verification-rect" data-node-id="protected-target-verification" x="445" y="130" width="180" height="150" rx="16"/></g>
    <g fill="#183431" stroke="#5cc8bb"><rect id="target-outcome-rect" data-node-id="target-outcome" x="665" y="72" width="190" height="130" rx="14"/></g><g fill="#2d2114" stroke="#d3a44d"><rect id="outcome-evidence-rect" data-node-id="outcome-evidence" x="665" y="238" width="190" height="130" rx="14"/></g>
    <g fill="#edf4f7" text-anchor="middle"><g data-label-for="orchestration-input" data-role="primary-label"><text x="109" y="85" font-size="12" font-weight="800">watsonx Orchestrate</text></g><g data-label-for="orchestration-input" data-role="secondary-label"><text x="109" y="111" font-size="11">ação proposta</text></g><g data-label-for="lineage-context" data-role="primary-label"><text x="109" y="195" font-size="13" font-weight="800">Manta</text></g><g data-label-for="lineage-context" data-role="secondary-label"><text x="109" y="221" font-size="11">linhagem e contexto</text></g><g data-label-for="identity-authority-context" data-role="primary-label"><text x="109" y="303" font-size="11" font-weight="800"><tspan x="109">Identidade e</tspan><tspan x="109" dy="18">autoridade</tspan></text></g>
      <g data-label-for="trustgate-clearance" data-role="primary-label"><text x="320" y="169" font-size="13" font-weight="800"><tspan x="320">TrustGate</tspan><tspan x="320" dy="19">Sovereign</tspan></text></g><g data-label-for="trustgate-clearance" data-role="secondary-label"><text x="320" y="225" font-size="11"><tspan x="320">Autorização da ação</tspan><tspan x="320" dy="18">+ recibo vinculado</tspan></text></g>
      <g data-label-for="protected-target-verification" data-role="primary-label"><text x="535" y="160" font-size="11" font-weight="800"><tspan x="535">Validação pelo</tspan><tspan x="535" dy="17">sistema-alvo</tspan><tspan x="535" dy="17">protegido</tspan></text></g><g data-label-for="protected-target-verification" data-role="secondary-label"><text x="535" y="226" font-size="10"><tspan x="535">Limite ilustrativo</tspan><tspan x="535" dy="17">antes da alteração</tspan></text></g>
      <g data-label-for="target-outcome" data-role="primary-label"><text x="760" y="104" font-size="11" font-weight="800"><tspan x="760">Resultado ilustrativo</tspan><tspan x="760" dy="18">no lado do Db2</tspan></text></g><g data-label-for="target-outcome" data-role="secondary-label"><text x="760" y="168" font-size="11">aceite ou rejeitado</text></g>
      <g data-label-for="outcome-evidence" data-role="primary-label"><text x="760" y="276" font-size="11" font-weight="800"><tspan x="760">Evidência do resultado</tspan><tspan x="760" dy="18">passível de</tspan><tspan x="760" dy="18">análise</tspan></text></g>
    </g>
    <g fill="none" stroke="#5cc8bb" stroke-width="3" stroke-linecap="round"><path id="inputs-to-clearance" data-role="inputs-to-clearance" d="M194 95h22v110h15M194 205h37M194 315h22V205h15"/><path id="clearance-to-verification" data-role="clearance-to-verification" d="M405 205h36"/><path id="verification-to-outcome" data-role="verification-to-outcome" d="M625 205h20v-68h16"/><path id="outcome-to-evidence" data-role="outcome-to-evidence" d="M760 202v32"/></g>
  </g>
</svg>
