<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 620 360">
  <title id="title">Cockpit de evidência TG360</title><desc id="desc">Um cockpit abstrato TG360 apresenta contexto conhecido e inspecionável, âmbito delimitado e limites explícitos, uma demonstração sintética claramente identificada, um limite não ativado, visibilidade da prova para análise e evidência disponível numa sessão privada.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#101419"/><stop offset="1" stop-color="#183431"/></linearGradient></defs><rect width="620" height="360" rx="26" fill="url(#bg)"/><rect x="44" y="42" width="532" height="276" rx="20" fill="#171d23" stroke="#4d626f"/><rect x="64" y="64" width="492" height="42" rx="14" fill="#1e2930" stroke="#2b3a43"/><text x="86" y="91" fill="#edf4f7" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">Cockpit de evidência TG360</text>
  <g font-family="ui-sans-serif, system-ui, sans-serif"><g><rect x="64" y="128" width="150" height="66" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="139" y="158" text-anchor="middle" fill="#edf4f7" font-size="13" font-weight="800">Contexto conhecido</text><text x="139" y="178" text-anchor="middle" fill="#a8b6c2" font-size="12">inspecionável</text></g><g><rect x="234" y="128" width="150" height="66" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="309" y="158" text-anchor="middle" fill="#edf4f7" font-size="13" font-weight="800">Âmbito delimitado</text><text x="309" y="178" text-anchor="middle" fill="#a8b6c2" font-size="12">limites explícitos</text></g><g><rect x="404" y="128" width="150" height="66" rx="14" fill="#2d2114" stroke="#d3a44d"/><text x="479" y="158" text-anchor="middle" fill="#edf4f7" font-size="12" font-weight="800">Demonstração sintética</text><text x="479" y="178" text-anchor="middle" fill="#a8b6c2" font-size="11">claramente identificada</text></g><g><rect x="64" y="218" width="150" height="66" rx="14" fill="#2d2114" stroke="#d3a44d"/><text x="139" y="248" text-anchor="middle" fill="#edf4f7" font-size="13" font-weight="800">Não ativado</text><text x="139" y="268" text-anchor="middle" fill="#a8b6c2" font-size="12">limite</text></g><g><rect x="234" y="218" width="150" height="66" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="309" y="248" text-anchor="middle" fill="#edf4f7" font-size="13" font-weight="800">Visibilidade da prova</text><text x="309" y="268" text-anchor="middle" fill="#a8b6c2" font-size="12">postura de análise</text></g><g><rect x="404" y="218" width="150" height="66" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="479" y="248" text-anchor="middle" fill="#edf4f7" font-size="13" font-weight="800">Sessão privada</text><text x="479" y="268" text-anchor="middle" fill="#a8b6c2" font-size="12">evidência privada</text></g></g>
</svg>
