<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 620 360">
  <title id="title">Arquitetura empresarial ilustrativa da TrustGate Sovereign</title>
  <desc id="desc">Um fluxo empresarial ilustrativo combina uma ação proposta pelo watsonx Orchestrate, linhagem e contexto Manta, e contexto de identidade e autoridade antes da autorização da TrustGate Sovereign e de um recibo vinculado. Um limite separado de validação pelo sistema-alvo protegido precede um resultado aceite ou rejeitado no lado do Db2 e evidência do resultado passível de análise.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#13202b"/><stop offset="1" stop-color="#162b3e"/></linearGradient></defs><rect width="620" height="360" rx="26" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif"><g id="orchestration-input" data-role="orchestration-input"><rect x="24" y="60" width="126" height="72" rx="14" fill="#1e2930" stroke="#5cc8bb"/><text x="87" y="88" text-anchor="middle" fill="#edf4f7" font-size="12" font-weight="800">watsonx Orchestrate</text><text x="87" y="111" text-anchor="middle" fill="#a8b6c2" font-size="11">ação proposta</text></g><g id="lineage-context" data-role="lineage-context"><rect x="24" y="156" width="126" height="72" rx="14" fill="#1e2930" stroke="#5cc8bb"/><text x="87" y="185" text-anchor="middle" fill="#edf4f7" font-size="12" font-weight="800">Manta</text><text x="87" y="207" text-anchor="middle" fill="#a8b6c2" font-size="11">linhagem e contexto</text></g><g id="identity-authority-context" data-role="identity-authority-context"><rect x="24" y="252" width="126" height="54" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="87" y="275" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">identidade e autoridade</text><text x="87" y="292" text-anchor="middle" fill="#a8b6c2" font-size="10">contexto</text></g><g id="trustgate-clearance" data-role="trustgate-clearance"><rect x="190" y="120" width="116" height="116" rx="16" fill="#102823" stroke="#d3a44d" stroke-width="2"/><text x="248" y="154" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">TrustGate Sovereign</text><text x="248" y="179" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">autorização</text><text x="248" y="197" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">da ação</text><text x="248" y="218" text-anchor="middle" fill="#a8b6c2" font-size="10">+ recibo vinculado</text></g><g id="protected-target-verification" data-role="protected-target-verification"><rect x="346" y="108" width="126" height="140" rx="16" fill="#102823" stroke="#d3a44d" stroke-width="2"/><text x="409" y="143" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">Validação pelo</text><text x="409" y="161" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">sistema-alvo</text><text x="409" y="179" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">protegido</text><text x="409" y="206" text-anchor="middle" fill="#a8b6c2" font-size="9">limite ilustrativo</text><text x="409" y="223" text-anchor="middle" fill="#a8b6c2" font-size="9">antes da alteração</text></g><g id="target-outcome" data-role="target-outcome"><rect x="512" y="108" width="84" height="98" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="554" y="137" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">Resultado no</text><text x="554" y="155" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">lado do Db2</text><text x="554" y="178" text-anchor="middle" fill="#a8b6c2" font-size="9">aceite ou</text><text x="554" y="194" text-anchor="middle" fill="#a8b6c2" font-size="9">rejeitado</text></g><g id="outcome-evidence" data-role="outcome-evidence"><rect x="512" y="226" width="84" height="68" rx="14" fill="#2d2114" stroke="#d3a44d"/><text x="554" y="249" text-anchor="middle" fill="#edf4f7" font-size="9" font-weight="800">Evidência do</text><text x="554" y="265" text-anchor="middle" fill="#edf4f7" font-size="9" font-weight="800">resultado passível</text><text x="554" y="281" text-anchor="middle" fill="#edf4f7" font-size="9" font-weight="800">de análise</text></g></g>
  <g fill="none" stroke="#5cc8bb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path data-role="inputs-to-clearance" d="M152 96c24 0 20 82 34 82m-34 14h34m-34 87c24 0 20-82 34-95"/><path data-role="clearance-to-verification" d="M308 178h34l-8-7m8 7-8 7"/><path data-role="verification-to-outcome" d="M474 157h34l-8-7m8 7-8 7"/><path data-role="outcome-to-evidence" d="M554 208v14l-7-8m7 8 7-8"/></g>
  <text x="310" y="330" text-anchor="middle" fill="#a8b6c2" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Exemplo ilustrativo de arquitetura empresarial</text>
</svg>
