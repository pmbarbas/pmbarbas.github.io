<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 620 360">
  <title id="title">Cadeia de autorização da ação e prova da TrustGate Sovereign</title>
  <desc id="desc">Uma ação proposta e o respetivo contexto de autoridade, propósito, âmbito, sistema-alvo, rota e evidência passam pela autorização da ação da TrustGate Sovereign, por um recibo vinculado, pela validação no sistema-alvo protegido, pela aceitação ou rejeição antes da alteração de estado e pela prova do resultado.</desc>
  <defs><linearGradient id="panel" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#13202b"/><stop offset="1" stop-color="#0d2c2a"/></linearGradient></defs>
  <rect width="620" height="360" rx="26" fill="url(#panel)"/>
  <g id="action-context" data-role="action-context" font-family="ui-sans-serif, system-ui, sans-serif"><text x="30" y="42" fill="#a8b6c2" font-size="12" font-weight="700">CONTEXTO DA AÇÃO</text><g fill="#183431" stroke="#5cc8bb"><rect x="30" y="56" width="98" height="34" rx="9"/><rect x="138" y="56" width="112" height="34" rx="9"/><rect x="260" y="56" width="98" height="34" rx="9"/><rect x="368" y="56" width="98" height="34" rx="9"/><rect x="476" y="56" width="114" height="34" rx="9"/></g><g fill="#edf4f7" font-size="11" font-weight="750" text-anchor="middle"><text x="79" y="78">Autoridade</text><text x="194" y="78">Propósito / âmbito</text><text x="309" y="78">Sistema-alvo</text><text x="417" y="78">Rota</text><text x="533" y="78">Evidência</text></g></g>
  <g font-family="ui-sans-serif, system-ui, sans-serif"><g id="proposed-action" data-role="proposed-action"><rect x="22" y="146" width="82" height="92" rx="14" fill="#1e2930" stroke="#5cc8bb"/><text x="63" y="181" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">Ação</text><text x="63" y="201" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">proposta</text></g><g id="trustgate-clearance" data-role="trustgate-clearance"><rect x="120" y="138" width="104" height="108" rx="15" fill="#102823" stroke="#d3a44d" stroke-width="2"/><text x="172" y="171" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">TrustGate</text><text x="172" y="190" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">Sovereign</text><text x="172" y="214" text-anchor="middle" fill="#a8b6c2" font-size="10">Autorização</text><text x="172" y="230" text-anchor="middle" fill="#a8b6c2" font-size="10">da ação</text></g><g id="bound-receipt" data-role="bound-receipt"><rect x="240" y="146" width="82" height="92" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="281" y="181" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">Recibo</text><text x="281" y="201" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">vinculado</text></g><g id="protected-target-verification" data-role="protected-target-verification"><rect x="338" y="126" width="126" height="132" rx="16" fill="#102823" stroke="#d3a44d" stroke-width="2"/><text x="401" y="161" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">Validação pelo</text><text x="401" y="179" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">sistema-alvo</text><text x="401" y="197" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">protegido</text><text x="401" y="225" text-anchor="middle" fill="#a8b6c2" font-size="9">antes da alteração</text></g><g id="target-outcome" data-role="target-outcome"><rect x="480" y="146" width="74" height="92" rx="14" fill="#1e2930" stroke="#5cc8bb"/><text x="517" y="178" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">Aceitar</text><text x="517" y="197" text-anchor="middle" fill="#a8b6c2" font-size="10">ou rejeitar</text><text x="517" y="215" text-anchor="middle" fill="#a8b6c2" font-size="9">no alvo</text></g><g id="outcome-proof" data-role="outcome-proof"><rect x="570" y="146" width="36" height="92" rx="12" fill="#2d2114" stroke="#d3a44d"/><text x="588" y="176" text-anchor="middle" fill="#edf4f7" font-size="8" font-weight="800">Prova</text><text x="588" y="193" text-anchor="middle" fill="#edf4f7" font-size="8" font-weight="800">do</text><text x="588" y="210" text-anchor="middle" fill="#edf4f7" font-size="8" font-weight="800">resultado</text></g></g>
  <g fill="none" stroke="#5cc8bb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path data-role="action-to-clearance" d="M106 192h10l-6-6m6 6-6 6"/><path data-role="clearance-to-receipt" d="M226 192h10l-6-6m6 6-6 6"/><path data-role="receipt-to-verification" d="M324 192h10l-6-6m6 6-6 6"/><path data-role="verification-to-outcome" d="M466 192h10l-6-6m6 6-6 6"/><path data-role="outcome-to-proof" d="M556 192h10l-6-6m6 6-6 6"/></g>
  <text x="310" y="302" text-anchor="middle" fill="#a8b6c2" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">A autorização é validada no sistema-alvo protegido antes da alteração de estado</text>
</svg>
