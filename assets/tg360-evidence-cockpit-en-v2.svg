<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 900 440" width="900" height="440">
  <title id="title">TG360 evidence cockpit</title><desc id="desc">Six aligned cards show known context, bounded scope, synthetic demonstration, a not-enabled boundary, proof visibility, and private-session evidence.</desc>
  <rect id="panel-rect" data-node-id="panel" x="1" y="1" width="898" height="438" rx="18" fill="#11191f" stroke="#34444f"/><g font-family="ui-sans-serif,system-ui,sans-serif"><text x="55" y="62" fill="#edf4f7" font-size="20" font-weight="800">TG360 EVIDENCE COCKPIT</text><text x="55" y="88" fill="#a8b6c2" font-size="12">Evidence posture and explicit boundaries</text>
  <g fill="#183431" stroke="#5cc8bb"><rect id="known-context-rect" data-node-id="known-context" x="55" y="115" width="250" height="105" rx="12"/><rect id="bounded-scope-rect" data-node-id="bounded-scope" x="325" y="115" width="250" height="105" rx="12"/><rect id="synthetic-demonstration-rect" data-node-id="synthetic-demonstration" x="595" y="115" width="250" height="105" rx="12"/><rect id="proof-visibility-rect" data-node-id="proof-visibility" x="55" y="250" width="250" height="105" rx="12"/><rect id="private-session-rect" data-node-id="private-session" x="325" y="250" width="250" height="105" rx="12"/></g><rect id="not-enabled-rect" data-node-id="not-enabled" x="595" y="250" width="250" height="105" rx="12" fill="#2d2114" stroke="#d3a44d"/>
  <g fill="#edf4f7" text-anchor="middle"><g data-label-for="known-context" data-role="primary-label"><text x="180" y="158" font-size="14" font-weight="800">Known context</text></g><g data-label-for="known-context" data-role="secondary-label"><text x="180" y="188" font-size="11">inspectable</text></g><g data-label-for="bounded-scope" data-role="primary-label"><text x="450" y="158" font-size="14" font-weight="800">Bounded scope</text></g><g data-label-for="bounded-scope" data-role="secondary-label"><text x="450" y="188" font-size="11">explicit limits</text></g><g data-label-for="synthetic-demonstration" data-role="primary-label"><text x="720" y="151" font-size="13" font-weight="800"><tspan x="720">Synthetic</tspan><tspan x="720" dy="19">demonstration</tspan></text></g><g data-label-for="synthetic-demonstration" data-role="secondary-label"><text x="720" y="199" font-size="11">clearly identified</text></g><g data-label-for="proof-visibility" data-role="primary-label"><text x="180" y="293" font-size="14" font-weight="800">Proof visibility</text></g><g data-label-for="proof-visibility" data-role="secondary-label"><text x="180" y="323" font-size="11">review posture</text></g><g data-label-for="private-session" data-role="primary-label"><text x="450" y="293" font-size="14" font-weight="800">Private session</text></g><g data-label-for="private-session" data-role="secondary-label"><text x="450" y="323" font-size="11">private evidence</text></g><g data-label-for="not-enabled" data-role="primary-label"><text x="720" y="293" font-size="14" font-weight="800">Not enabled</text></g><g data-label-for="not-enabled" data-role="secondary-label"><text x="720" y="323" font-size="11">explicit boundary</text></g></g></g>
</svg>
