<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 900 440" width="900" height="440">
  <title id="title">Cockpit de evidência TG360</title><desc id="desc">Seis cartões alinhados apresentam contexto conhecido, âmbito delimitado, demonstração sintética, um limite não ativado, visibilidade da prova e evidência de sessão privada.</desc>
  <rect id="panel-rect" data-node-id="panel" x="1" y="1" width="898" height="438" rx="18" fill="#11191f" stroke="#34444f"/><g font-family="ui-sans-serif,system-ui,sans-serif"><text x="55" y="62" fill="#edf4f7" font-size="20" font-weight="800">COCKPIT DE EVIDÊNCIA TG360</text><text x="55" y="88" fill="#a8b6c2" font-size="12">Postura da evidência e limites explícitos</text>
  <g fill="#183431" stroke="#5cc8bb"><rect id="known-context-rect" data-node-id="known-context" x="55" y="115" width="250" height="105" rx="12"/><rect id="bounded-scope-rect" data-node-id="bounded-scope" x="325" y="115" width="250" height="105" rx="12"/><rect id="synthetic-demonstration-rect" data-node-id="synthetic-demonstration" x="595" y="115" width="250" height="105" rx="12"/><rect id="proof-visibility-rect" data-node-id="proof-visibility" x="55" y="250" width="250" height="105" rx="12"/><rect id="private-session-rect" data-node-id="private-session" x="325" y="250" width="250" height="105" rx="12"/></g><rect id="not-enabled-rect" data-node-id="not-enabled" x="595" y="250" width="250" height="105" rx="12" fill="#2d2114" stroke="#d3a44d"/>
  <g fill="#edf4f7" text-anchor="middle"><g data-label-for="known-context" data-role="primary-label"><text x="180" y="158" font-size="14" font-weight="800">Contexto conhecido</text></g><g data-label-for="known-context" data-role="secondary-label"><text x="180" y="188" font-size="11">inspecionável</text></g><g data-label-for="bounded-scope" data-role="primary-label"><text x="450" y="158" font-size="14" font-weight="800">Âmbito delimitado</text></g><g data-label-for="bounded-scope" data-role="secondary-label"><text x="450" y="188" font-size="11">limites explícitos</text></g><g data-label-for="synthetic-demonstration" data-role="primary-label"><text x="720" y="151" font-size="13" font-weight="800"><tspan x="720">Demonstração</tspan><tspan x="720" dy="19">sintética</tspan></text></g><g data-label-for="synthetic-demonstration" data-role="secondary-label"><text x="720" y="199" font-size="11">devidamente identificada</text></g><g data-label-for="proof-visibility" data-role="primary-label"><text x="180" y="293" font-size="14" font-weight="800">Visibilidade da prova</text></g><g data-label-for="proof-visibility" data-role="secondary-label"><text x="180" y="323" font-size="11">postura de análise</text></g><g data-label-for="private-session" data-role="primary-label"><text x="450" y="293" font-size="14" font-weight="800">Sessão privada</text></g><g data-label-for="private-session" data-role="secondary-label"><text x="450" y="323" font-size="11">evidência privada</text></g><g data-label-for="not-enabled" data-role="primary-label"><text x="720" y="293" font-size="14" font-weight="800">Não ativado</text></g><g data-label-for="not-enabled" data-role="secondary-label"><text x="720" y="323" font-size="11">limite explícito</text></g></g></g>
</svg>
