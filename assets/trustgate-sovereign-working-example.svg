<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 620 360">
  <title id="title">TrustGate Sovereign illustrative enterprise stack</title>
  <desc id="desc">An illustrative enterprise flow combines a watsonx Orchestrate proposed action, Manta lineage and context, and identity and authority context before TrustGate Sovereign clearance and a bound receipt. A separate protected-target verification boundary precedes an accepted or rejected Db2-side outcome and reviewable outcome evidence.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#13202b"/><stop offset="1" stop-color="#162b3e"/></linearGradient></defs>
  <rect width="620" height="360" rx="26" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <g id="orchestration-input" data-role="orchestration-input"><rect x="24" y="60" width="126" height="72" rx="14" fill="#1e2930" stroke="#5cc8bb"/><text x="87" y="88" text-anchor="middle" fill="#edf4f7" font-size="12" font-weight="800">watsonx Orchestrate</text><text x="87" y="111" text-anchor="middle" fill="#a8b6c2" font-size="11">proposed action</text></g>
    <g id="lineage-context" data-role="lineage-context"><rect x="24" y="156" width="126" height="72" rx="14" fill="#1e2930" stroke="#5cc8bb"/><text x="87" y="185" text-anchor="middle" fill="#edf4f7" font-size="12" font-weight="800">Manta</text><text x="87" y="207" text-anchor="middle" fill="#a8b6c2" font-size="11">lineage and context</text></g>
    <g id="identity-authority-context" data-role="identity-authority-context"><rect x="24" y="252" width="126" height="54" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="87" y="275" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">identity and authority</text><text x="87" y="292" text-anchor="middle" fill="#a8b6c2" font-size="10">context</text></g>
    <g id="trustgate-clearance" data-role="trustgate-clearance"><rect x="190" y="120" width="116" height="116" rx="16" fill="#102823" stroke="#d3a44d" stroke-width="2"/><text x="248" y="156" text-anchor="middle" fill="#edf4f7" font-size="12" font-weight="800">TrustGate Sovereign</text><text x="248" y="181" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">action clearance</text><text x="248" y="207" text-anchor="middle" fill="#a8b6c2" font-size="11">+ bound receipt</text></g>
    <g id="protected-target-verification" data-role="protected-target-verification"><rect x="346" y="112" width="126" height="132" rx="16" fill="#102823" stroke="#d3a44d" stroke-width="2"/><text x="409" y="151" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">Protected-target</text><text x="409" y="172" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">verification</text><text x="409" y="199" text-anchor="middle" fill="#a8b6c2" font-size="10">illustrative boundary</text><text x="409" y="218" text-anchor="middle" fill="#a8b6c2" font-size="10">before target change</text></g>
    <g id="target-outcome" data-role="target-outcome"><rect x="512" y="112" width="84" height="92" rx="14" fill="#183431" stroke="#5cc8bb"/><text x="554" y="143" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">Db2-side</text><text x="554" y="163" text-anchor="middle" fill="#edf4f7" font-size="11" font-weight="800">target outcome</text><text x="554" y="184" text-anchor="middle" fill="#a8b6c2" font-size="10">accept / reject</text></g>
    <g id="outcome-evidence" data-role="outcome-evidence"><rect x="512" y="224" width="84" height="64" rx="14" fill="#2d2114" stroke="#d3a44d"/><text x="554" y="249" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">reviewable</text><text x="554" y="267" text-anchor="middle" fill="#edf4f7" font-size="10" font-weight="800">outcome evidence</text></g>
  </g>
  <g fill="none" stroke="#5cc8bb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path data-role="inputs-to-clearance" d="M152 96c24 0 20 82 34 82m-34 14h34m-34 87c24 0 20-82 34-95"/><path data-role="clearance-to-verification" d="M308 178h34l-8-7m8 7-8 7"/><path data-role="verification-to-outcome" d="M474 158h34l-8-7m8 7-8 7"/><path data-role="outcome-to-evidence" d="M554 206v14l-7-8m7 8 7-8"/></g>
  <text x="310" y="330" text-anchor="middle" fill="#a8b6c2" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Illustrative enterprise-stack example only</text>
</svg>
