<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 620 360">
  <title id="title">TrustGate Sovereign illustrative enterprise stack</title>
  <desc id="desc">An illustrative enterprise flow shows watsonx Orchestrate proposing an action toward Db2 with Manta context, passing through TrustGate Sovereign before clear or hold and proof.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#13202b"/>
      <stop offset="1" stop-color="#162b3e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="620" height="360" rx="26" fill="url(#bg)"/>
  <g stroke="#4d626f" stroke-width="1" fill="none">
    <path d="M54 68h512M54 292h512"/>
    <path d="M98 40v280M522 40v280"/>
  </g>
  <g filter="url(#shadow)" font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="38" y="76" width="138" height="72" rx="16" fill="#1e2930" stroke="#5cc8bb"/>
    <text x="107" y="106" text-anchor="middle" fill="#edf4f7" font-size="14" font-weight="800">watsonx</text>
    <text x="107" y="127" text-anchor="middle" fill="#a8b6c2" font-size="13">Orchestrate</text>
    <rect x="38" y="212" width="138" height="72" rx="16" fill="#1e2930" stroke="#5cc8bb"/>
    <text x="107" y="242" text-anchor="middle" fill="#edf4f7" font-size="14" font-weight="800">Manta</text>
    <text x="107" y="263" text-anchor="middle" fill="#a8b6c2" font-size="13">lineage/context</text>
    <rect x="248" y="144" width="138" height="72" rx="18" fill="#102823" stroke="#d3a44d" stroke-width="3"/>
    <text x="317" y="174" text-anchor="middle" fill="#edf4f7" font-size="14" font-weight="800">TrustGate</text>
    <text x="317" y="195" text-anchor="middle" fill="#edf4f7" font-size="14" font-weight="800">Sovereign</text>
    <rect x="454" y="76" width="128" height="72" rx="16" fill="#1e2930" stroke="#5cc8bb"/>
    <text x="518" y="116" text-anchor="middle" fill="#edf4f7" font-size="15" font-weight="800">Db2 target</text>
    <rect x="454" y="212" width="128" height="72" rx="16" fill="#183431" stroke="#5cc8bb"/>
    <text x="518" y="242" text-anchor="middle" fill="#edf4f7" font-size="14" font-weight="800">clear / hold</text>
    <text x="518" y="263" text-anchor="middle" fill="#a8b6c2" font-size="13">proof</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 112h52" stroke="#5cc8bb" stroke-width="4"/>
    <path d="M226 103l16 9-16 9" stroke="#5cc8bb" stroke-width="4"/>
    <path d="M180 248c40 0 36-68 62-68" stroke="#5cc8bb" stroke-width="4"/>
    <path d="M234 171l16 9-16 9" stroke="#5cc8bb" stroke-width="4"/>
    <path d="M390 180h46c18 0 28-20 28-44" stroke="#d3a44d" stroke-width="4"/>
    <path d="M455 141l9-16 9 16" stroke="#d3a44d" stroke-width="4"/>
    <path d="M390 180h46c18 0 28 20 28 44" stroke="#d3a44d" stroke-width="4"/>
    <path d="M455 219l9 16 9-16" stroke="#d3a44d" stroke-width="4"/>
  </g>
  <text x="310" y="326" text-anchor="middle" fill="#a8b6c2" font-size="13">Illustrative stack example only</text>
</svg>
