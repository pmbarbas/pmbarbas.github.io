<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 900 440" width="900" height="440">
  <title id="title">Cadeia de autorização da ação e prova da TrustGate Sovereign</title>
  <desc id="desc">O contexto e uma ação proposta passam pela autorização da TrustGate Sovereign, por um recibo vinculado, pela validação no sistema-alvo protegido, pela aceitação ou rejeição e pela prova do resultado.</desc>
  <rect id="panel-rect" data-node-id="panel" x="1" y="1" width="898" height="438" rx="18" fill="#11191f" stroke="#34444f"/>
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <text x="28" y="36" fill="#d3a44d" font-size="13" font-weight="800">CONTEXTO DA AÇÃO</text>
    <g fill="#183431" stroke="#5cc8bb"><rect id="authority-rect" data-node-id="authority" x="24" y="52" width="160" height="62" rx="10"/><rect id="purpose-scope-rect" data-node-id="purpose-scope" x="197" y="52" width="160" height="62" rx="10"/><rect id="target-rect" data-node-id="target" x="370" y="52" width="160" height="62" rx="10"/><rect id="route-rect" data-node-id="route" x="543" y="52" width="160" height="62" rx="10"/><rect id="evidence-rect" data-node-id="evidence" x="716" y="52" width="160" height="62" rx="10"/></g>
    <g fill="#edf4f7" font-size="13" font-weight="700" text-anchor="middle"><g data-label-for="authority" data-role="primary-label"><text x="104" y="88">Autoridade</text></g><g data-label-for="purpose-scope" data-role="primary-label"><text x="277" y="80"><tspan x="277">Propósito /</tspan><tspan x="277" dy="17">âmbito</tspan></text></g><g data-label-for="target" data-role="primary-label"><text x="450" y="80"><tspan x="450">Sistema-</tspan><tspan x="450" dy="17">alvo</tspan></text></g><g data-label-for="route" data-role="primary-label"><text x="623" y="88">Rota</text></g><g data-label-for="evidence" data-role="primary-label"><text x="796" y="88">Evidência</text></g></g>
    <g fill="#1e2930" stroke="#5cc8bb"><rect id="proposed-action-rect" data-node-id="proposed-action" x="24" y="190" width="110" height="120" rx="14"/><rect id="bound-receipt-rect" data-node-id="bound-receipt" x="306" y="190" width="110" height="120" rx="14"/><rect id="target-outcome-rect" data-node-id="target-outcome" x="634" y="190" width="110" height="120" rx="14"/></g>
    <g fill="#102823" stroke="#d3a44d" stroke-width="2"><rect id="trustgate-clearance-rect" data-node-id="trustgate-clearance" x="150" y="175" width="140" height="150" rx="16"/><rect id="protected-target-verification-rect" data-node-id="protected-target-verification" x="432" y="170" width="186" height="160" rx="16"/><rect id="outcome-proof-rect" data-node-id="outcome-proof" x="760" y="190" width="116" height="120" rx="14"/></g>
    <g fill="#edf4f7" text-anchor="middle"><g data-label-for="proposed-action" data-role="primary-label"><text x="79" y="242" font-size="13" font-weight="800"><tspan x="79">Ação</tspan><tspan x="79" dy="19">proposta</tspan></text></g><g data-label-for="trustgate-clearance" data-role="primary-label"><text x="220" y="214" font-size="12" font-weight="800"><tspan x="220">TrustGate</tspan><tspan x="220" dy="18">Sovereign</tspan></text></g><g data-label-for="trustgate-clearance" data-role="secondary-label"><text x="220" y="271" font-size="11"><tspan x="220">Autorização</tspan><tspan x="220" dy="17">da ação</tspan></text></g><g data-label-for="bound-receipt" data-role="primary-label"><text x="361" y="242" font-size="13" font-weight="800"><tspan x="361">Recibo</tspan><tspan x="361" dy="19">vinculado</tspan></text></g><g data-label-for="protected-target-verification" data-role="primary-label"><text x="525" y="208" font-size="11" font-weight="800"><tspan x="525">Validação pelo</tspan><tspan x="525" dy="17">sistema-alvo</tspan><tspan x="525" dy="17">protegido</tspan></text></g><g data-label-for="protected-target-verification" data-role="secondary-label"><text x="525" y="282" font-size="10"><tspan x="525">Antes da alteração</tspan><tspan x="525" dy="16">de estado</tspan></text></g><g data-label-for="target-outcome" data-role="primary-label"><text x="689" y="232" font-size="12" font-weight="800"><tspan x="689">Aceitar ou</tspan><tspan x="689" dy="18">rejeitar no</tspan><tspan x="689" dy="18">alvo</tspan></text></g><g data-label-for="outcome-proof" data-role="primary-label"><text x="818" y="232" font-size="12" font-weight="800"><tspan x="818">Prova do</tspan><tspan x="818" dy="18">resultado</tspan></text></g></g>
    <g fill="none" stroke="#5cc8bb" stroke-width="3" stroke-linecap="round"><path id="action-to-clearance" data-role="action-to-clearance" d="M134 250h12"/><path id="clearance-to-receipt" data-role="clearance-to-receipt" d="M290 250h12"/><path id="receipt-to-verification" data-role="receipt-to-verification" d="M416 250h12"/><path id="verification-to-outcome" data-role="verification-to-outcome" d="M618 250h12"/><path id="outcome-to-proof" data-role="outcome-to-proof" d="M744 250h12"/></g>
  </g>
</svg>
